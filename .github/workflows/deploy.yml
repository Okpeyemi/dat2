name: Deploy Beta
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    environment:
      name: beta
      url: beta.grigri.africa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish
        run: |
          docker buildx build -t ghcr.io/${{ github.repository_owner }}/grigri-ui:dev .
          echo ${{ secrets.GITHUB_TOKEN }} | docker login -u ${{ github.repository_owner }} ghcr.io --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/grigri-ui:dev
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/beta.grigri.africa
            ./deploy.sh
